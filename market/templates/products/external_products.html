{% extends 'base.html' %}

{% block content %}

<h1>Products from FakeStore API</h1>

<div class="product-grid">

{% for product in products %}
    <div class="card">
        <img src="{{ product.image }}" width="120">
        <h3>{{ product.title }}</h3>
        <p>${{ product.price }}</p>
        <p>{{ product.category }}</p>
    </div>
{% endfor %}

</div>

{% endblock %}
