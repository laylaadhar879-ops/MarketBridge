<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
</head>
<body>
    <h1>{{ product.name }}</h1>
    <p>{{ product.description }}</p>
    <p>Price: ${{ product.price }}</p>
    <p>Stock: {{ product.stock }}</p>
    
    {% if product.stock > 0 %}
        <a href="{% url 'create_order' product.id %}">Buy Now</a>
    {% else %}
        <p>Out of stock</p>
    {% endif %}
    
    <a href="{% url 'home' %}">Back to Shops</a>
</body>
</html>
