{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <title>MarketBridge</title>
</head>
<body>
    <header class="navbar">
        <h1 class="brand">MarketBridge</h1>
        <nav class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'external_products' %}">Browse Products</a>

            <a href="{% url 'basket' %}" class="icon-link" title="Basket" aria-label="Basket"><i class="fa-solid fa-basket-shopping"></i></a>

            <button type="button" class="icon-link search-toggle" id="searchToggle" title="Open search" aria-label="Open search">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

            <form method="get" action="{% url 'external_products' %}" class="nav-search" id="navSearch" role="search">
                <input type="text" name="q" id="navSearchInput" placeholder="Search products..." aria-label="Search products">
                <button type="submit" class="search-submit" title="Search" aria-label="Search"><i class="fa-solid fa-arrow-right"></i></button>
            </form>

            {% if user.is_authenticated %}
                <span class="nav-user">Hi, {{ user.username }}</span>
                <a href="{% url 'login' %}" class="icon-link" title="Account" aria-label="Account"><i class="fa-solid fa-circle-user"></i></a>
                <form method="post" action="{% url 'logout' %}" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="nav-btn">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="icon-link" title="Account" aria-label="Account"><i class="fa-solid fa-circle-user"></i></a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
