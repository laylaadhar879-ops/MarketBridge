{% extends 'base.html' %}

{% block content %}
<section style="max-width: 420px; margin: 20px auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; box-shadow: 0 8px 22px rgba(17, 24, 39, 0.08);">
    <h2 style="margin-top: 0; margin-bottom: 8px;">Login</h2>
    <p style="margin-top: 0; color: #6b7280;">Sign in to continue.</p>

    {% if form.errors %}
        <p style="color: #b91c1c;">Invalid username or password. Please try again.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 14px;">
            <label for="id_username" style="display: block; margin-bottom: 6px; font-weight: 600;">Username</label>
            <input type="text" name="username" id="id_username" required style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px;">
        </div>

        <div style="margin-bottom: 16px;">
            <label for="id_password" style="display: block; margin-bottom: 6px; font-weight: 600;">Password</label>
            <input type="password" name="password" id="id_password" required style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px;">
        </div>

        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <button type="submit" style="width: 100%; padding: 11px; background: #111827; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">Log In</button>
    </form>

    <p style="margin-top: 14px; text-align: center; color: #4b5563;">
        Don’t have an account?
        <a href="{% url 'signup' %}" style="color: #2563eb; text-decoration: none; font-weight: 600;">Sign up</a>
    </p>
</section>
{% endblock %}
