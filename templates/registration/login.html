{% extends 'base.html' %}

{% block content %}
<section class="auth-card auth-card-login">
    <h2 class="auth-title">Login</h2>
    <p class="auth-subtitle">Sign in to continue.</p>

    {% if form.errors %}
        <p class="auth-error-text">Invalid username or password. Please try again.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="auth-field auth-field-login-username">
            <label for="id_username" class="auth-label">Username</label>
            <input type="text" name="username" id="id_username" required class="auth-input">
        </div>

        <div class="auth-field auth-field-login-password">
            <label for="id_password" class="auth-label">Password</label>
            <input type="password" name="password" id="id_password" required class="auth-input">
        </div>

        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <button type="submit" class="auth-submit-btn">Log In</button>
    </form>

    <p class="auth-switch-text">
        Don’t have an account?
        <a href="{% url 'signup' %}" class="auth-switch-link">Sign up</a>
    </p>
</section>
{% endblock %}
