<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
</head>
<body>
    <h1>My Orders</h1>
    
    {% if orders %}
        <table>
            <tr>
                <th>Order ID</th>
                <th>Status</th>
                <th>Total Amount</th>
                <th>Payment Status</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
            {% for order in orders %}
            <tr>
                <td>#{{ order.id }}</td>
                <td>{{ order.status }}</td>
                <td>${{ order.total_amount }}</td>
                <td>{{ order.payment_status }}</td>
                <td>{{ order.order_date }}</td>
                <td>
                    <a href="{% url 'order_detail' order.id %}">View</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No orders yet.</p>
    {% endif %}
    
    <a href="{% url 'home' %}">Continue Shopping</a>
</body>
</html>
